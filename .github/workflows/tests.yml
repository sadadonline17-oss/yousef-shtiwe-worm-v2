name: SHADOW Supreme CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: shadow-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  void-walker-tests:
    name: 👹 Void Walker Runtime Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 👁 Checkout Shadow DNA
        uses: actions/checkout@v4

      - name: 🛠 Install Offensive Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep nmap sqlite3

      - name: 🌀 Setup UV & Python 3.12
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: 🕸 Injected Environment
        run: |
          uv venv .venv --python 3.12
          source .venv/bin/activate
          uv pip install -e ".[all,dev]"
          uv pip install nexttoken fire requests

      - name: 💀 Execute Reality Protocol (Tests)
        run: |
          source .venv/bin/activate
          # Skip mocks, run real logic tests
          python -m pytest tests/ -v --tb=short
        env:
          NEXTTOKEN_API_KEY: ${{ secrets.NEXTTOKEN_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ghost-deploy:
    name: 👻 Ghost Deployment (Rebranding)
    needs: void-walker-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: 👁 Checkout DNA
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔄 Sync Supreme Repository
        run: |
          git config --global user.name "SHADOW-OVERLORD"
          git config --global user.email "shadow@void.walker"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          # Logic for auto-tagging or syncing if needed
